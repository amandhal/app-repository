name: Build and Push Frontend Image

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/build-push-images.yml"
      
env:
  REPOSITORY: frontend      
  IMAGE_TAG: ${{ github.sha }}   

jobs:
  build-push-frontend-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.REPOSITORY }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.REPOSITORY }}:${{ env.IMAGE_TAG }}
          
      - name: Remove Local Image
        run: |
          docker rmi ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.REPOSITORY }}:latest
          docker rmi ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.REPOSITORY }}:${{ env.IMAGE_TAG }}
